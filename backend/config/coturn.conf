# ─────────────────────────────────────────────────────────────────────────────
# coturn configuration for COESCD / КЧС Emergency Management Platform
#
# Install:  apt install coturn   (Ubuntu/Debian)
#           dnf install coturn   (RHEL/Fedora)
#
# Enable at boot: systemctl enable coturn && systemctl start coturn
# Config path:    /etc/coturn/turnserver.conf   (symlink or copy this file)
#
# Required env / DNS:
#   TURN_HOST   — public hostname or IP of this server, e.g. turn.example.com
#   TURN_SECRET — shared secret; generate with: openssl rand -hex 32
#
# The backend reads TURN_HOST and TURN_SECRET from its .env file and uses
# them to generate short-lived HMAC-SHA1 credentials (see CallsService).
# coturn uses the same secret to validate those credentials without any
# database round-trip.
# ─────────────────────────────────────────────────────────────────────────────

# ── Network ──────────────────────────────────────────────────────────────────

# Public IP / hostname clients use to reach this server.
# Replace with your actual public IP or DNS name.
realm=turn.example.com
server-name=turn.example.com

# Bind to all interfaces (0.0.0.0) or lock to a specific NIC.
listening-ip=0.0.0.0

# Standard TURN/STUN ports
listening-port=3478          # UDP + TCP
tls-listening-port=5349      # TLS (TURNS) — requires cert below

# If this host sits behind NAT (e.g. cloud VM), set both addresses:
# external-ip=<PUBLIC_IP>/<PRIVATE_IP>
# Example: external-ip=203.0.113.10/10.0.1.5

# ── Authentication ────────────────────────────────────────────────────────────

# HMAC-based ephemeral credentials — no database required.
# The secret MUST match TURN_SECRET in backend/.env exactly.
use-auth-secret
static-auth-secret=REPLACE_WITH_YOUR_TURN_SECRET

# Credential lifetime (seconds). Must be >= the ttl issued by CallsService
# (currently 86400 = 24 h). A 25-hour window gives a small overlap buffer.
credential-lifetime=90000

# ── TLS (recommended for production) ─────────────────────────────────────────

# Provide a valid TLS certificate for the TURNS (port 5349) listener.
# Let's Encrypt example paths — adjust for your distro / cert manager:
# cert=/etc/letsencrypt/live/turn.example.com/fullchain.pem
# pkey=/etc/letsencrypt/live/turn.example.com/privkey.pem
# cipher-list=ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256
# no-sslv3
# no-tlsv1
# no-tlsv1_1

# ── Relay restrictions ────────────────────────────────────────────────────────

# Block relay to loopback / RFC-1918 ranges so the TURN server cannot be
# abused as an internal network proxy.
no-loopback-peers
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Only allow the media protocols WebRTC actually uses (UDP preferred, TCP
# fallback; do NOT enable DTLS relay — WebRTC handles DTLS itself).
no-tcp-relay

# ── Performance ───────────────────────────────────────────────────────────────

# Number of relay threads (default: number of CPU cores).
# relay-threads=4

# Max allocation bandwidth per user (bits/s). 0 = unlimited.
# max-bps=1048576

# ── Logging ───────────────────────────────────────────────────────────────────

log-file=/var/log/coturn/turnserver.log
# Uncomment for verbose debugging (very chatty in production):
# verbose

# ── Fingerprint ──────────────────────────────────────────────────────────────

# Always include STUN fingerprint attribute — required by WebRTC.
fingerprint
